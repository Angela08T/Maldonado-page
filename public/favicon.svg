<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <!-- Fondo blanco redondeado -->
  <rect width="100" height="100" rx="14" fill="#ffffff"/>

  <!-- Letra J — azul -->
  <text x="3" y="78"
        font-family="Impact, Arial Black, 'Arial Narrow', sans-serif"
        font-weight="900"
        font-size="78"
        fill="#0057B8">J</text>

  <!-- Letra M — rojo -->
  <text x="42" y="78"
        font-family="Impact, Arial Black, 'Arial Narrow', sans-serif"
        font-weight="900"
        font-size="78"
        fill="#D62828">M</text>

  <!-- Estrella 4 puntas en azul (top-right) -->
  <path d="M83,5 L85.5,11 L92,13 L85.5,15 L83,22 L80.5,15 L74,13 L80.5,11 Z"
        fill="#0057B8"/>

  <!-- Swoosh rojo en la parte inferior -->
  <path d="M6,92 Q30,84 54,88 Q72,91 94,84"
        stroke="#D62828" stroke-width="5.5"
        fill="none" stroke-linecap="round"/>

</svg>
